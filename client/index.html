<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reveal SDK Dashboard Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #F1F5F9;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Sidebar ────────────────────────────────────── */
        #sidebar {
            width: 15rem;
            background: linear-gradient(180deg, #1E293B 0%, #0F172A 100%);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #sidebar.collapsed {
            width: 4.5rem;
        }

        #sidebar-header {
            height: 4rem;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
        }

        #sidebar.collapsed #sidebar-header {
            justify-content: center;
            padding: 0;
        }

        #sidebar-toggle {
            padding: 0.5rem;
            border-radius: 8px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            margin-right: 0.625rem;
            transition: all 0.2s ease;
        }

        #sidebar-toggle:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #FFFFFF;
        }

        #sidebar-title {
            font-size: 1.125rem;
            font-weight: 700;
            color: #FFFFFF;
            letter-spacing: -0.02em;
        }

        #sidebar.collapsed #sidebar-title {
            display: none;
        }

        /* ── Navigation ─────────────────────────────────── */
        #main-nav {
            flex-grow: 1;
            overflow-y: auto;
            padding: 0.75rem 0;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 0.625rem 1rem;
            color: rgba(255, 255, 255, 0.55);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.8125rem;
            transition: all 0.15s ease;
            border-radius: 8px;
            margin: 2px 0.625rem;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.01em;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.9);
        }

        .nav-link.active-nav-item {
            background: rgba(79, 70, 229, 0.25);
            color: #FFFFFF;
            font-weight: 600;
        }

        .nav-link svg {
            margin-right: 0.75rem;
            flex-shrink: 0;
            width: 1.125rem;
            height: 1.125rem;
            opacity: 0.7;
        }

        .nav-link.active-nav-item svg {
            opacity: 1;
            color: #A5B4FC;
        }

        #sidebar.collapsed .nav-link {
            justify-content: center;
            padding-left: 0.5rem;
            padding-right: 0.5rem;
        }

        #sidebar.collapsed .nav-link svg {
            margin-right: 0;
        }

        #sidebar.collapsed .nav-text {
            display: none;
        }

        .indicator {
            position: absolute;
            left: 0;
            top: 6px;
            bottom: 6px;
            width: 3px;
            border-radius: 0 3px 3px 0;
            background-color: transparent;
            transition: background-color 0.15s ease;
        }

        .nav-link.active-nav-item .indicator {
            background-color: #818CF8;
        }

        .nav-divider {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            margin: 0.5rem 0.75rem;
        }

        /* ── Main Content ───────────────────────────────── */
        .main-container {
            display: flex;
            height: 100vh;
        }

        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #F1F5F9;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }

        .iframe-container {
            width: 100%;
            height: 100vh;
            border: none;
            display: none;
            overflow: hidden;
        }

        .iframe-container.active {
            display: block;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #94A3B8;
            font-size: 0.9375rem;
            font-weight: 500;
            display: none;
        }

        /* ── Scrollbar ──────────────────────────────────── */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Sidebar -->
        <aside id="sidebar">
            <div id="sidebar-header">
                <button id="sidebar-toggle" title="Toggle sidebar">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="4" x2="20" y1="12" y2="12"/>
                        <line x1="4" x2="20" y1="6" y2="6"/>
                        <line x1="4" x2="20" y1="18" y2="18"/>
                    </svg>
                </button>
                <h1 id="sidebar-title">Reveal SDK</h1>
            </div>

            <nav id="main-nav">
                <a href="#" class="nav-link active-nav-item" data-page="load-dashboard">
                    <span class="indicator"></span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 3v18h18"/>
                        <path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"/>
                    </svg>
                    <span class="nav-text">Dashboards</span>
                </a>
                
                <a href="#" class="nav-link" data-page="index-ds">
                    <span class="indicator"></span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <ellipse cx="12" cy="5" rx="9" ry="3"/>
                        <path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/>
                        <path d="M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3"/>
                    </svg>
                    <span class="nav-text">New Dashboard</span>
                </a>
                
                <!-- index-dsi nav disabled – container commented out
                <a href="#" class="nav-link" data-page="index-dsi">
                    <span class="indicator"></span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2v20"/>
                        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                    </svg>
                    <span class="nav-text">Dynamic Data Sources</span>
                </a>
                -->
                 <hr class="nav-divider">

                <a href="#" class="nav-link" data-page="ai-chat">
                    <span class="indicator"></span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                    <span class="nav-text">AI Chat</span>
                </a>

                <a href="#" class="nav-link" data-page="ai-insights">
                    <span class="indicator"></span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 16v-4"/>
                        <path d="M12 8h.01"/>
                    </svg>
                    <span class="nav-text">AI Insights</span>
                </a>

                <hr class="nav-divider">

                <a href="#" class="nav-link" data-page="builder">
                    <span class="indicator"></span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7"/>
                        <rect x="14" y="3" width="7" height="7"/>
                        <rect x="3" y="14" width="7" height="7"/>
                        <rect x="14" y="14" width="7" height="7"/>
                    </svg>
                    <span class="nav-text">Dashboard Builder</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main id="main-content">
            <!-- Content Area -->
            <div class="content-area">
                <div class="loading" id="loading">Loading dashboard...</div>
                
                <div class="iframe-container active" id="load-dashboard-container">
                    <iframe src="load-dashboard.html" id="load-dashboard-frame" title="Load Dashboard - Reveal SDK Dashboard Loading Example"></iframe>
                </div>
                
                <div class="iframe-container" id="index-ds-container">
                    <iframe src="index-ds.html" id="index-ds-frame" title="Data Sources - Reveal SDK Data Source Configuration"></iframe>
                </div>
                
                <!-- <div class="iframe-container" id="index-dsi-container">
                    <iframe src="index-dsi.html" id="index-dsi-frame" title="Dynamic Data Sources - Reveal SDK Dynamic Data Source Implementation"></iframe>
                </div> -->

                <div class="iframe-container" id="ai-chat-container">
                    <iframe src="AI.html" id="ai-chat-frame" title="AI Chat - Reveal SDK AI Integration"></iframe>
                </div>
                <div class="iframe-container" id="ai-insights-container">
                    <iframe src="Insights.html" id="ai-insights-frame" title="AI Insights - Reveal SDK AI Integration"></iframe>
                </div>
                <div class="iframe-container" id="builder-container">
                    <iframe src="builder.html" id="builder-frame" title="Dashboard Builder - Reveal SDK"></iframe>
                </div>
                
            </div>
        </main>
    </div>

    <script>
        let currentPage = 'load-dashboard';

        // Page titles mapping
        const pageTitles = {
            'load-dashboard': 'Load Dashboard',
            'index-ds': 'Data Sources',
            'ai-chat': 'AI Chat',
            'ai-insights': 'AI Insights',
            'builder': 'Dashboard Builder'
        };

        // DOM elements
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebar-toggle');
       // const pageTitle = document.getElementById('page-title');
        const loading = document.getElementById('loading');
        const navLinks = document.querySelectorAll('.nav-link');

        // Sidebar toggle functionality
        sidebarToggle.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
        });

        // Navigation functionality
        function showPage(pageName) {
            // Hide loading indicator
            loading.style.display = 'none';
            
            // Remove active class from all containers and nav links
            document.querySelectorAll('.iframe-container').forEach(container => {
                container.classList.remove('active');
            });
            
            navLinks.forEach(link => {
                link.classList.remove('active-nav-item');
            });
            
            // Show selected container and activate nav link
            const targetContainer = document.getElementById(pageName + '-container');
            const targetNavLink = document.querySelector(`[data-page="${pageName}"]`);
            
            if (targetContainer) {
                targetContainer.classList.add('active');
            }
            
            if (targetNavLink) {
                targetNavLink.classList.add('active-nav-item');
            }
            
            // // Update page title
            // if (pageTitle && pageTitles[pageName]) {
            //     pageTitle.textContent = pageTitles[pageName];
            // }
            
            currentPage = pageName;
            setActivePage(pageName);
        }

        // Add click listeners to navigation links
        navLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const pageName = link.getAttribute('data-page');
                if (pageName) {
                    loading.style.display = 'block';
                    setTimeout(() => showPage(pageName), 100); // Small delay for loading effect
                }
            });
        });

        // Handle iframe loading
        document.querySelectorAll('iframe').forEach(iframe => {
            iframe.addEventListener('load', function() {
                if (this.parentElement.classList.contains('active')) {
                    loading.style.display = 'none';
                }
            });
        });

        // Restore the active page from session, or default to load-dashboard
        function getActivePage() {
            return sessionStorage.getItem('activePage') || 'load-dashboard';
        }

        function setActivePage(pageName) {
            sessionStorage.setItem('activePage', pageName);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            showPage(getActivePage());
        });
    </script>
</body>
</html>
