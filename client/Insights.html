<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reveal AI Insights</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="insights.css">
</head>

<body>
    <div class="insights-layout">
        <!-- Dashboard area -->
        <div class="dashboard-area">
            <div id="revealView" class="dashboard-view"></div>
        </div>

        <!-- Collapsible Insights Panel -->
        <div class="insights-panel" id="insightsPanel">
            <div class="insights-panel-header" id="insightsPanelHeader">
                <div class="insights-panel-title">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 16v-4"/>
                        <path d="M12 8h.01"/>
                    </svg>
                    <span>AI Insights</span>
                </div>
                <div class="insights-panel-controls">
                    <button type="button" class="icon-btn" id="copyBtn" title="Copy to clipboard">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect width="14" height="14" x="8" y="8" rx="2" ry="2"/>
                            <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
                        </svg>
                    </button>
                    <label class="streaming-toggle">
                        <input type="checkbox" id="streamingToggle" checked>
                        <span>Stream</span>
                    </label>
                    <button type="button" class="collapse-btn" id="collapseBtn" title="Toggle panel">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 18 9 12 15 6"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="insights-panel-body" id="insightsPanelBody">
                <div class="console-content" id="consoleOutput">
                    <div class="insights-empty">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2a7 7 0 0 1 7 7c0 2.38-1.19 4.47-3 5.74V17a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1v-2.26C6.19 13.47 5 11.38 5 9a7 7 0 0 1 7-7z"/>
                            <path d="M9 21h6"/><path d="M10 21v1h4v-1"/>
                        </svg>
                        <p>Right-click a visualization or the dashboard to generate AI insights.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/dayjs@1.8.21/dayjs.min.js"></script>
    <script src="https://dl.revealbi.io/reveal/libs/1.8.4/infragistics.reveal.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@revealbi/api@1.0.5/dist/index.umd.js"></script>
    <script src="styles/reveal-theme.js"></script>
    <script src="ai-insights.js"></script>

    <script type="text/javascript">
        // -- Collapse / Expand toggle -----------------------------------------------
        const panel = document.getElementById('insightsPanel');
        const collapseBtn = document.getElementById('collapseBtn');

        collapseBtn.addEventListener('click', () => {
            panel.classList.toggle('collapsed');
        });

        // -- Reveal SDK Setup -------------------------------------------------------
        $.ig.RevealSdkSettings.setBaseUrl("http://localhost:5111/");
        rv.RevealSdkClient.initialize({ hostUrl: 'http://localhost:5111/' });

        const client = rv.RevealSdkClient.getInstance();
        var revealView;

        // -- Build a Reveal context menu item that requests an AI Insight -----------
        function createInsightMenuItem(label, dashboard, insightType, visualizationId = null) {
            return new $.ig.RVMenuItem(label, null, async () => {
                // Auto-expand panel when insight is requested
                panel.classList.remove('collapsed');

                clearConsole();
                const streamingEnabled = document.getElementById('streamingToggle').checked;

                const options = { dashboard, type: insightType };
                if (visualizationId) options.visualizationId = visualizationId;

                if (streamingEnabled) {
                    const stream = await client.ai.insights.get({ ...options, stream: true });
                    stream.on('progress', (message) => updateProgress(message));
                    stream.on('text',     (content)  => appendContent(content));
                    await stream.finalResponse();
                } else {
                    const result = await client.ai.insights.get(options);
                    appendToConsole(result.explanation);
                }
            });
        }

        // -- Load dashboard and wire AI Insight menu items --------------------------
        $.ig.RVDashboard.loadDashboard("Manufacturing", async (dashboard) => {
            revealView = new $.ig.RevealView("#revealView");
            revealView.canEdit = false;
            revealView.canSaveAs = false;
            revealView.showRefresh = false;
            revealView.canCopyVisualization = false;
            revealView.dashboard = dashboard;

            revealView.onMenuOpening = function (visualization, args) {
                if (args.menuLocation === $.ig.RVMenuLocation.Dashboard) {
                    args.menuItems.push(createInsightMenuItem("Dashboard Summary",  dashboard, 'summary'));
                    args.menuItems.push(createInsightMenuItem("Dashboard Analysis", dashboard, 'analysis'));
                    args.menuItems.push(createInsightMenuItem("Dashboard Forecast", dashboard, 'forecast'));
                }
                if (args.menuLocation === $.ig.RVMenuLocation.Visualization) {
                    args.menuItems.push(createInsightMenuItem("Visualization Summary",  dashboard, 'summary',  visualization.id));
                    args.menuItems.push(createInsightMenuItem("Visualization Analysis", dashboard, 'analysis', visualization.id));
                    args.menuItems.push(createInsightMenuItem("Visualization Forecast", dashboard, 'forecast', visualization.id));
                }
            };
        });
    </script>
</body>

</html>
