<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reveal AI Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <!-- Chat Panel -->
        <div class="chat-panel">
            <div class="chat-messages" id="chatMessages">
                <div class="empty-state">
                    <div class="empty-state-icon">🚀</div>
                    <h3>Start a conversation</h3>
                    <p>Ask questions about your data and I'll help you create insightful dashboards and visualizations.</p>
                    <div class="suggested-questions" id="suggestedQuestions">
                        <!-- Suggested questions will be inserted here -->
                    </div>
                </div>
            </div>
            <div class="suggestions-panel" id="suggestionsPanel">
                <div class="suggestions-header" id="suggestionsHeader">
                    <div class="suggestions-title">
                        <span>💡</span>
                        <span>Try asking...</span>
                    </div>
                    <div class="suggestions-toggle" id="suggestionsToggle">▼</div>
                </div>
                <div class="suggestions-content" id="suggestionsContent">
                    <!-- Quick suggestions will be inserted here -->
                </div>
            </div>
            <div class="chat-input-container">
                <div class="chat-input-wrapper">
                    <textarea id="chatInput" class="chat-input" placeholder="Ask me anything about your data..." rows="1"></textarea>
                    <button id="sendButton" class="send-button">Send</button>
                </div>
            </div>
        </div>

        <!-- Dashboard Panel -->
        <div class="dashboard-panel">
            <div id="revealView"></div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/dayjs@1.8.21/dayjs.min.js"></script>
    <script src="https://dl.revealbi.io/reveal/libs/1.8.4/infragistics.reveal.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@revealbi/api@1.0.5/dist/index.umd.js"></script>
    <script src="styles/reveal-theme.js"></script>

    <script type="text/javascript">
        // ── Reveal SDK Setup ──────────────────────────────────────────
        $.ig.RevealSdkSettings.setBaseUrl("http://localhost:5111/");
        rv.RevealSdkClient.initialize({ hostUrl: 'http://localhost:5111/' });

        // ── Initialize RevealView ─────────────────────────────────────
        function initializeDashboard() {
            revealView = new $.ig.RevealView("#revealView");
            revealView.canEdit = true;
            revealView.canSaveAs = true;
            revealView.showRefresh = false;
            revealView.canCopyVisualization = false;

            revealView.onSave = function(rv, args) {
                if (args.saveAs) {
                    var name = prompt("Enter a name for the dashboard:", args.name);
                    if (!name) { args.saveFinished(); return; }
                    args.name = name;
                }
                args.saveFinished();
            };
        }

        // ── Load dashboard returned by AI ─────────────────────────────
        async function loadDashboardFromResponse(dashboardJson) {
            const json = JSON.parse(dashboardJson);
            revealView.dashboard = await $.ig.RevealUtility.createDashboardFromJsonObject(json);
        }

        // ── Send chat message via Reveal AI ───────────────────────────
        async function sendRevealChat(question, handlers) {
            const stream = await client.ai.chat.sendMessage({
                message: question,
                datasourceId: 'NorthwindDB',
                ...(revealView.dashboard ? { dashboard: revealView.dashboard } : {}),
                stream: true,
            });
            stream.on('progress', handlers.onProgress);
            stream.on('text',     handlers.onText);
            stream.on('error',    handlers.onError);
            return stream.finalResponse();
        }
    </script>
    <script src="ai-chat.js"></script>
</body>

</html>
